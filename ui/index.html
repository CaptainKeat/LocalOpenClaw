<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoonClaw Control</title>
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script>
      // Browser polyfill for `process` and related Node globals that sneak
      // into the Control UI bundle via shared source files. Runs before any
      // module code so top-level server-only evaluations see a safe stub
      // instead of `ReferenceError: process is not defined`.
      (function () {
        if (typeof globalThis.process === "undefined") {
          globalThis.process = {
            env: {},
            argv: [],
            execArgv: [],
            execPath: "",
            platform: "browser",
            arch: "browser",
            version: "",
            versions: { node: "" },
            cwd: function () { return ""; },
            chdir: function () {},
            nextTick: function (fn) {
              var args = Array.prototype.slice.call(arguments, 1);
              Promise.resolve().then(function () { fn.apply(null, args); });
            },
            exit: function () {},
            on: function () {},
            off: function () {},
            once: function () {},
            emit: function () {},
            stdin: null,
            stdout: { write: function () { return true; }, isTTY: false },
            stderr: { write: function () { return true; }, isTTY: false },
          };
        }
        if (typeof globalThis.global === "undefined") {
          globalThis.global = globalThis;
        }
      })();
    </script>
    <script>
      (function () {
        var THEMES = { claw: 1, knot: 1, dash: 1, goon: 1 };
        var MODES = { system: 1, light: 1, dark: 1 };
        var LEGACY = {
          dark: "claw:dark",
          light: "claw:light",
          openknot: "knot:dark",
          fieldmanual: "dash:dark",
          clawdash: "dash:light",
          system: "claw:system",
        };
        try {
          var keys = Object.keys(localStorage);
          var raw;
          for (var i = 0; i < keys.length; i++) {
            if (keys[i].indexOf("openclaw.control.settings.v1") === 0) {
              raw = localStorage.getItem(keys[i]);
              if (raw) break;
            }
          }
          if (!raw) return;
          var s = JSON.parse(raw);
          var t = s && s.theme;
          var m = s && s.themeMode;
          if (typeof t !== "string") t = "";
          if (typeof m !== "string") m = "";
          var legacy = LEGACY[t];
          var theme = THEMES[t] ? t : legacy ? legacy.split(":")[0] : "claw";
          var mode = MODES[m] ? m : legacy ? legacy.split(":")[1] : "system";
          if (mode === "system") {
            mode = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          var resolved =
            theme === "knot"
              ? mode === "light"
                ? "openknot-light"
                : "openknot"
              : theme === "dash"
                ? mode === "light"
                  ? "dash-light"
                  : "dash"
                : theme === "goon"
                  ? mode === "light"
                    ? "goonclaw-light"
                    : "goonclaw"
                  : mode === "light"
                    ? "light"
                    : "dark";
          document.documentElement.setAttribute("data-theme", resolved);
          document.documentElement.setAttribute(
            "data-theme-mode",
            resolved.indexOf("light") !== -1 ? "light" : "dark",
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <openclaw-app></openclaw-app>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
